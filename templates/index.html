<!--

flask 서버상의 화면 ui 형식 파일

-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Camera Dashboard</title>
<style>
  :root{
    --bg:#0a0e1a;
    --card:#111729;
    --card-head:#0d1322;
    --border:#1e2942;
    --text:#e6ebf5;
    --muted:#7e8aa3;
    --accent:#4a9eff;
    --green:#8bb46a;
    --red:#c0432e;
    --yellow:#d4b04a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    padding:0 0 40px;
  }
  /* top nav bar */
  .topbar{
    display:flex;align-items:center;gap:24px;
    padding:14px 26px;border-bottom:1px solid var(--border);
    background:var(--card-head);
  }
  .topbar .logo{
    width:34px;height:34px;border-radius:8px;
    background:var(--accent);display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .topbar h1{font-size:16px;font-weight:600;letter-spacing:.3px}
  .topbar .links{margin-left:8px;display:flex;gap:20px;color:var(--muted);font-size:14px}

  .wrap{max-width:1500px;margin:0 auto;padding:0 24px}

  /* section */
  .section{margin-top:26px}
  .section-head{
    display:flex;align-items:center;gap:14px;cursor:pointer;
    padding:6px 4px;user-select:none;
  }
  .chev{transition:transform .2s;color:var(--muted);font-size:14px}
  .section.collapsed .chev{transform:rotate(-90deg)}
  .section-head .title{font-size:20px;font-weight:600}
  .section-head .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;margin-top:12px;overflow:hidden;
    transition:max-height .25s ease, opacity .2s;
  }
  .section.collapsed .card{display:none}
  .card-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--border);
    background:var(--card-head);
  }
  .card-bar .label{font-size:14px;font-weight:600}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.off{background:var(--red)}

  .stream-area{
    display:flex;align-items:center;justify-content:center;
    padding:22px;min-height:280px;background:#070a12;
  }
  .stream-area img{
    max-width:100%;width:640px;border-radius:8px;
    border:1px solid var(--border);display:block;
  }
  .offline{
    color:var(--muted);text-align:center;font-size:14px;
  }
  .offline .big{font-size:42px;margin-bottom:10px;opacity:.5}
  .reconnect{
    margin-top:14px;background:var(--accent);color:#fff;border:none;
    padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;
  }
  .reconnect:hover{filter:brightness(1.1)}
</style>
</head>
<body>

  <div class="topbar">
    <div class="logo">🤖</div>
    <h1>Robot Camera Dashboard</h1>
    <div class="links"><span>Pinky</span><span>Turtle 1</span><span>Turtle 2</span></div>
  </div>

  <div class="wrap">

    <!-- SECTION 1: PINKY PRO -->
    <div class="section" id="sec-pinky">
      <div class="section-head" onclick="toggle('sec-pinky')">
        <span class="chev">▼</span>
        <div>
          <div class="title">Pinky Pro</div>
          <div class="sub">CSI camera · floor scan / lead</div>
        </div>
      </div>
      <div class="card">
        <div class="card-bar">
          <span class="label">Live Feed — Pinky</span>
          <span class="status"><span class="dot" id="dot-pinky"></span><span id="txt-pinky">connecting…</span></span>
        </div>
        <div class="stream-area" id="area-pinky"></div>
      </div>
    </div>

    <!-- SECTION 2: TURTLEBOT 1 -->
    <div class="section" id="sec-turtle1">
      <div class="section-head" onclick="toggle('sec-turtle1')">
        <span class="chev">▼</span>
        <div>
          <div class="title">TurtleBot 1</div>
          <div class="sub">OMX-AI manipulator · follower</div>
        </div>
      </div>
      <div class="card">
        <div class="card-bar">
          <span class="label">Live Feed — TurtleBot 1</span>
          <span class="status"><span class="dot" id="dot-turtle1"></span><span id="txt-turtle1">connecting…</span></span>
        </div>
        <div class="stream-area" id="area-turtle1"></div>
      </div>
    </div>

    <!-- SECTION 3: TURTLEBOT 2 -->
    <div class="section" id="sec-turtle2">
      <div class="section-head" onclick="toggle('sec-turtle2')">
        <span class="chev">▼</span>
        <div>
          <div class="title">TurtleBot 2</div>
          <div class="sub">OMX-AI manipulator · follower</div>
        </div>
      </div>
      <div class="card">
        <div class="card-bar">
          <span class="label">Live Feed — TurtleBot 2</span>
          <span class="status"><span class="dot" id="dot-turtle2"></span><span id="txt-turtle2">connecting…</span></span>
        </div>
        <div class="stream-area" id="area-turtle2"></div>
      </div>
    </div>

  </div>

<script>
  // ===== EDIT THESE FEED URLs =====
  // Pinky is served by THIS Flask app -> keep "/video_feed".
  // Turtlebots are separate robots -> set their own IP:port.
  const FEEDS = {
    pinky:   "/video_feed",
    turtle1: "http://192.168.0.101:5000/video_feed",
    turtle2: "http://192.168.0.102:5000/video_feed",
  };
  // ================================

  function toggle(id){ document.getElementById(id).classList.toggle('collapsed'); }

  function mount(name){
    const area = document.getElementById('area-'+name);
    const dot  = document.getElementById('dot-'+name);
    const txt  = document.getElementById('txt-'+name);
    area.innerHTML = '';
    const img = document.createElement('img');
    img.src = FEEDS[name] + (FEEDS[name].includes('?') ? '&' : '?') + 't=' + Date.now();
    img.onload  = () => { dot.className='dot live'; txt.textContent='live'; };
    img.onerror = () => {
      dot.className='dot off'; txt.textContent='offline';
      area.innerHTML =
        '<div class="offline"><div class="big">📷</div>No stream from '+name+
        '<br><button class="reconnect" onclick="mount(\''+name+'\')">Reconnect</button></div>';
    };
    area.appendChild(img);
  }

  ['pinky','turtle1','turtle2'].forEach(mount);
</script>

</body>
</html>
