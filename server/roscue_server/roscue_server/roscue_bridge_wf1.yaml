# roscue_bridge_wf1.yaml
# =====================================================================
# wf1(도메인 14) ↔ 서버(도메인 10) 사이 인터페이스 중계.
#
# 서버는 /wf1/ 접두사 이름을 쓰고, 브릿지가 로봇 도메인으로 넘길 때 접두사를 제거한다
# (로봇은 깨끗한 이름 /cmd_vel, /target_pose ... 사용). 현재는 서버 → 로봇 방향만 중계한다.
# (로봇 pose는 주행팀이 /wf{n}/amcl_pose 로 서버 도메인에 직접 브릿지 — 이 파일 밖)
#
# 로봇별로 파일을 분리: 단일 YAML에서 도메인 14/15 같은 키가 두 번 등장하면
# 표준 YAML 파서가 중복 키를 뒷값으로 덮어써 한쪽 엔트리가 사라지는 것을 방지.
#
# 실행 (커스텀 타입 해석을 위해 roscue_interface 가 source 돼 있어야 함):
#   source /opt/ros/jazzy/setup.bash && source install/setup.bash
#   ros2 run domain_bridge domain_bridge server/roscue_bridge_wf1.yaml
#
# =====================================================================

name: roscue_bridge_wf1

topics:
  # ── 서버 → 로봇 (접두사 제거) ────────────────────────────────────
  /wf1/target_pose:
    type: geometry_msgs/msg/PoseStamped
    from_domain: 10
    to_domain: 14
    remap: /target_pose
  /wf1/cmd_vel:
    type: geometry_msgs/msg/TwistStamped   # Jazzy/TurtleBot3 기준, web/yolo 게이트웨이도 TwistStamped 로 통일
    from_domain: 10
    to_domain: 14
    remap: /cmd_vel

  # ── 로봇 → 서버 (접두사 추가) ────────────────────────────────────
  # 로봇은 깨끗한 /amcl_pose 로 내보내고, 서버는 /wf1/amcl_pose 로 받는다.
  # 서버 _amcl_pose_callback 의 pose 단일 소스 → 이게 끊기면 파트너 소환이 보류됨.
  /amcl_pose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: 14
    to_domain: 10
    remap: /wf1/amcl_pose
    qos:
      reliability: reliable
      durability: transient_local   # AMCL 기본값(latched) — 서버 첫 구독 시 마지막 pose 수신 보장

# services: task_command / arm_pose 는 roscue_service_relay 노드가 담당
#   ros2 run roscue_server roscue_service_relay
